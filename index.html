<html lang="en">
<head>

    <link rel="stylesheet" href = style.css>
</head>
<body>
<div class="container">
    <h1>BMI CALCULATOR</h1>

    <label for="Weight">Weight(Kg)</label>

    <h2 id="result">Your BMI will appear here</h2>
    <p id="category"></p>
</div>

</body>
</html>
